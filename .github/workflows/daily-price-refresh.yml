name: Daily WLS Price Refresh

on:
  schedule:
    - cron: "5 5 * * *" # dagelijks 05:05 UTC
  workflow_dispatch:

jobs:
  refresh-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TARGET_BRANCH: codex/maagverkleiningvitaminen

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh catalog prices
        run: node scripts/refresh-wls-catalog-prices.mjs

      - name: Detect catalog changes
        id: changes
        run: |
          if git diff --quiet -- wls-static/public/catalog-data.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push refreshed catalog
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wls-static/public/catalog-data.js
          git commit -m "chore: daily auto-refresh WLS catalog prices"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Summary
        run: |
          echo "### Daily prijs-refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "- branch: \\`${TARGET_BRANCH}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- catalog gewijzigd: \\`${{ steps.changes.outputs.changed }}\\`" >> "$GITHUB_STEP_SUMMARY"
