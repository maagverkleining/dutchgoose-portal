name: Build & Deploy to Plesk

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DG_FTP_HOST }}
          username: ${{ secrets.DG_FTP_USER }}
          password: ${{ secrets.DG_FTP_PASS }}
          local-dir: ./out/
          server-dir: /httpdocs/portal/public/
